name: Release

# Build release binaries and attach them to the GitHub Release when a v* tag
# is pushed (e.g. `git tag v1.2.0 && git push origin v1.2.0`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -trimpath -o dist/go-grip-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -trimpath -o dist/go-grip-darwin-arm64 .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
